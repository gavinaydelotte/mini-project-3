<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchup Analysis – PokeTeam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">&#9670; PokeTeam</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="teambuilder.html">Team Builder</a></li>
      <li><a href="opponent.html">Pick Opponent</a></li>
      <li><a href="comparison.html">Matchup Analysis</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-title">Matchup Analysis</div>
  <div class="page-subtitle">Type-coverage breakdown for your team vs your opponent.</div>
  <div id="main-content"><div class="spinner"></div></div>
</div>

<script src="js/app.js"></script>
<script src="js/gymData.js"></script>
<script src="js/typeChart.js"></script>
<script>
const main = document.getElementById('main-content');

function toRoman(n) {
  const m={1:'I',2:'II',3:'III',4:'IV',5:'V',6:'VI',7:'VII',8:'VIII',9:'IX'};
  return m[n]||n;
}

async function init() {
  const myTeamRaw  = getMyTeam();
  const oppRaw     = getSelectedOpponent();

  if (myTeamRaw.length === 0 && !oppRaw) {
    main.innerHTML = `
      <div class="alert alert-warn">
        You haven't built a team or selected an opponent yet.
      </div>
      <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap">
        <a href="teambuilder.html" class="btn btn-primary">Build Team</a>
        <a href="opponent.html"    class="btn btn-yellow">Pick Opponent</a>
      </div>`;
    return;
  }
  if (myTeamRaw.length === 0) {
    main.innerHTML = `<div class="alert alert-warn">Your team is empty. <a href="teambuilder.html" style="color:inherit;font-weight:700">Build your team first.</a></div>`;
    return;
  }
  if (!oppRaw) {
    main.innerHTML = `<div class="alert alert-warn">No opponent selected. <a href="opponent.html" style="color:inherit;font-weight:700">Pick an opponent.</a></div>`;
    return;
  }

  // Fetch my team data
  const myFetched = await Promise.allSettled(myTeamRaw.map(p => fetchPokemon(p.name)));
  const myTeam = myFetched
    .map((r, i) => r.status === 'fulfilled'
      ? { name: myTeamRaw[i].name, level: myTeamRaw[i].level, types: getTypes(r.value), pkData: r.value }
      : null)
    .filter(Boolean);

  // Fetch opponent team
  const oppFetched = await Promise.allSettled(oppRaw.team.map(p => fetchPokemon(p.name)));
  const oppTeam = oppFetched
    .map((r, i) => r.status === 'fulfilled'
      ? { name: oppRaw.team[i].name, level: oppRaw.team[i].level, types: getTypes(r.value), pkData: r.value }
      : null)
    .filter(Boolean);

  if (myTeam.length === 0 || oppTeam.length === 0) {
    main.innerHTML = `<div class="alert alert-danger">Could not load Pokemon data. Check your internet connection.</div>`;
    return;
  }

  const analysis = analyseMatchup(myTeam, oppTeam);
  renderResults(myTeam, oppTeam, oppRaw, analysis);
}

function scoreColor(s) {
  if (s >= 70) return '#4ade80';
  if (s >= 45) return '#fbbf24';
  return '#f87171';
}

function scoreVerdict(s) {
  if (s >= 75) return { text: 'Strong Advantage', cls: 'alert-success' };
  if (s >= 55) return { text: 'Slight Advantage', cls: 'alert-success' };
  if (s >= 40) return { text: 'Even Matchup', cls: 'alert-info' };
  if (s >= 25) return { text: 'Slight Disadvantage', cls: 'alert-warn' };
  return { text: 'Strong Disadvantage', cls: 'alert-danger' };
}

function renderTeamSummary(team, label) {
  const cardsHTML = team.map(p =>
    `<div style="text-align:center">
       <img src="${getSpriteUrl(p.pkData)}" alt="${p.name}"
         style="width:80px;height:80px;image-rendering:pixelated">
       <div style="font-size:.78rem;font-weight:700;text-transform:capitalize;margin:3px 0">${p.name}</div>
       <div style="font-size:.7rem;color:var(--text-muted)">Lv.${p.level}</div>
       <div style="margin-top:3px">${p.types.map(typeBadge).join(' ')}</div>
     </div>`
  ).join('');
  return `
    <div>
      <div style="font-size:.75rem;font-weight:800;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px">${label}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">${cardsHTML}</div>
    </div>`;
}

function renderResults(myTeam, oppTeam, oppRaw, analysis) {
  const verdict = scoreVerdict(analysis.score);
  const sc = scoreColor(analysis.score);

  // --- VS Header ---
  const vsHTML = `
    <div class="vs-header">
      ${renderTeamSummary(myTeam, 'Your Team')}
      <div class="vs-text">VS</div>
      ${renderTeamSummary(oppTeam, `${oppRaw.name} (Gen ${toRoman(oppRaw.gen)})`)}
    </div>`;

  // --- Score card ---
  const scoreHTML = `
    <div class="card" style="text-align:center;padding:30px">
      <div class="score-circle" style="border-color:${sc}; background:${sc}18;">
        <div class="score-number" style="color:${sc}">${analysis.score}</div>
        <div class="score-label">/ 100</div>
      </div>
      <div style="font-size:1.2rem;font-weight:800;color:${sc};margin-bottom:6px">${verdict.text}</div>
      <div style="font-size:.85rem;color:var(--text-muted)">Battle Readiness Score</div>
    </div>`;

  // --- Coverage bars ---
  const offPct  = Math.round(analysis.offCoverage);
  const defPct  = Math.round(analysis.defCoverage);
  const offColor = offPct >= 60 ? '#4ade80' : offPct >= 35 ? '#fbbf24' : '#f87171';
  const defColor = defPct >= 60 ? '#4ade80' : defPct >= 35 ? '#fbbf24' : '#f87171';

  const coverageHTML = `
    <div class="card">
      <div class="section-title" style="margin-top:0">Coverage Summary</div>
      <div class="coverage-row">
        <div class="cov-label">
          <span>Offensive Coverage <small style="color:var(--text-muted)">(% of opp. Pokemon you hit SE)</small></span>
          <strong style="color:${offColor}">${offPct}%</strong>
        </div>
        <div class="cov-track">
          <div class="cov-fill" style="width:${offPct}%;background:${offColor}"></div>
        </div>
      </div>
      <div class="coverage-row" style="margin-top:14px">
        <div class="cov-label">
          <span>Defensive Coverage <small style="color:var(--text-muted)">(% of your team not hit SE)</small></span>
          <strong style="color:${defColor}">${defPct}%</strong>
        </div>
        <div class="cov-track">
          <div class="cov-fill" style="width:${defPct}%;background:${defColor}"></div>
        </div>
      </div>
    </div>`;

  // --- Recommendations ---
  const recItems = [];
  if (analysis.weakTo.length > 0)
    recItems.push(`Your team is weak to: <strong>${analysis.weakTo.map(t =>
      `<span class="type-badge type-${t}" style="font-size:.7rem">${t}</span>`).join(' ')}</strong>. Consider adding coverage.`);
  if (analysis.notCovered.length > 0)
    recItems.push(`You lack super-effective coverage against: <strong>${analysis.notCovered.map(t =>
      `<span class="type-badge type-${t}" style="font-size:.7rem">${t}</span>`).join(' ')}</strong>.`);
  if (analysis.weakTo.length === 0 && analysis.notCovered.length === 0)
    recItems.push('Your team has solid coverage for this matchup!');

  const recHTML = `
    <div class="rec-box">
      <h3>&#9656; Recommendations</h3>
      <ul>${recItems.map(r => `<li style="margin-bottom:6px">${r}</li>`).join('')}</ul>
    </div>`;

  // --- Individual matchup table (Your team vs each opponent) ---
  const offTableRows = analysis.offRows.map(me => {
    const bestMult = Math.max(...me.vs.map(v => v.mult));
    const cells = me.vs.map(v => `<td style="text-align:center">${multLabel(v.mult)}</td>`).join('');
    return `<tr>
      <td style="text-transform:capitalize;font-weight:700">${me.name}</td>
      <td>${me.types.map(typeBadge).join(' ')}</td>
      ${cells}
      <td style="text-align:center;font-weight:700;color:${scoreColor(bestMult >= 2 ? 80 : bestMult >= 1 ? 50 : 20)}">
        Best: ${bestMult >= 2 ? `${bestMult}×` : bestMult === 1 ? '1×' : `${bestMult}×`}
      </td>
    </tr>`;
  }).join('');

  const offHeaderCols = oppTeam.map(p =>
    `<th style="text-align:center;text-transform:capitalize">${p.name}</th>`
  ).join('');

  const offTableHTML = `
    <div class="card" style="overflow-x:auto">
      <div class="section-title" style="margin-top:0">Your Team — Offensive Matchups</div>
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:12px">How hard each of your Pokemon can hit each opponent (using their own types as move type proxy).</p>
      <table class="matchup-table">
        <thead><tr>
          <th>Your Pokemon</th><th>Types</th>
          ${offHeaderCols}
          <th>Best</th>
        </tr></thead>
        <tbody>${offTableRows}</tbody>
      </table>
    </div>`;

  // --- Defensive table (opponent hitting your team) ---
  const defTableRows = analysis.defRows.map(opp => {
    const cells = opp.vs.map(v => `<td style="text-align:center">${multLabel(v.mult)}</td>`).join('');
    const maxHit = Math.max(...opp.vs.map(v => v.mult));
    return `<tr>
      <td style="text-transform:capitalize;font-weight:700">${opp.name}</td>
      <td>${opp.types.map(typeBadge).join(' ')}</td>
      ${cells}
      <td style="text-align:center;font-weight:700;color:${maxHit >= 2 ? '#f87171' : '#4ade80'}">
        Best: ${maxHit}×
      </td>
    </tr>`;
  }).join('');

  const defHeaderCols = myTeam.map(p =>
    `<th style="text-align:center;text-transform:capitalize">${p.name}</th>`
  ).join('');

  const defTableHTML = `
    <div class="card" style="overflow-x:auto">
      <div class="section-title" style="margin-top:0">Opponent — Offensive Matchups vs You</div>
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:12px">How hard each opponent Pokemon can hit your team. Higher = more dangerous.</p>
      <table class="matchup-table">
        <thead><tr>
          <th>Opp. Pokemon</th><th>Types</th>
          ${defHeaderCols}
          <th>Threat</th>
        </tr></thead>
        <tbody>${defTableRows}</tbody>
      </table>
    </div>`;

  // --- Edit links ---
  const editHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
      <a href="teambuilder.html" class="btn btn-secondary">&#9998; Edit My Team</a>
      <a href="opponent.html"    class="btn btn-secondary">&#9998; Change Opponent</a>
    </div>`;

  main.innerHTML = `
    ${vsHTML}
    <div class="matchup-grid">
      ${scoreHTML}
      ${coverageHTML}
    </div>
    ${recHTML}
    <div class="divider"></div>
    ${offTableHTML}
    <div style="margin-top:18px"></div>
    ${defTableHTML}
    <div class="divider"></div>
    ${editHTML}`;
}

init();
</script>
</body>
</html>
