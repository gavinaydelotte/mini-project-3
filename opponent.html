<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Opponent – PokeTeam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">&#9670; PokeTeam</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="teambuilder.html">Team Builder</a></li>
      <li><a href="opponent.html">Pick Opponent</a></li>
      <li><a href="comparison.html">Matchup Analysis</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-title">Pick Opponent</div>
  <div class="page-subtitle">Choose a generation, then a game, then your opponent.</div>

  <!-- Step 1: Generation -->
  <div class="section-title">Step 1 — Generation</div>
  <div class="gen-grid" id="gen-grid"></div>

  <!-- Step 2: Game -->
  <div id="game-section" style="display:none">
    <div class="divider"></div>
    <div class="section-title">Step 2 — Game</div>
    <div id="game-buttons" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px"></div>
  </div>

  <!-- Step 3: Opponents -->
  <div id="opp-section" style="display:none">
    <div class="divider"></div>
    <div class="section-title">Step 3 — Choose Opponent</div>

    <!-- Category tabs -->
    <div id="cat-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <button class="btn cat-tab active" data-cat="all">All</button>
      <button class="btn cat-tab" data-cat="gym">Gym Leaders</button>
      <button class="btn cat-tab" data-cat="elite4">Elite Four</button>
      <button class="btn cat-tab" data-cat="champion">Champion</button>
      <button class="btn cat-tab" data-cat="rival">Rivals</button>
      <button class="btn cat-tab" data-cat="villain">Villains</button>
    </div>

    <!-- Search -->
    <div class="search-wrap" style="max-width:400px;margin-bottom:14px">
      <input type="text" class="search-input" id="trainer-search"
        placeholder="Filter by name or type..." autocomplete="off">
    </div>
    <div id="trainer-no-results" class="alert alert-info" style="display:none;max-width:500px">
      No trainers match that filter.
    </div>

    <div class="opponents-grid" id="opp-grid"></div>
  </div>

  <!-- Opponent preview -->
  <div id="opp-preview" style="display:none;margin-top:28px"></div>
</div>

<script src="js/app.js"></script>
<script src="js/gymData.js"></script>
<script>
  let selectedGen  = null;
  let selectedGame = null;
  let selectedOpp  = null;
  let activeCategory = 'all';

  const CAT_LABELS = {
    gym:      'Gym Leader',
    elite4:   'Elite Four',
    champion: 'Champion',
    rival:    'Rival',
    villain:  'Villain'
  };

  function toRoman(n) {
    return {1:'I',2:'II',3:'III',4:'IV',5:'V',6:'VI',7:'VII',8:'VIII',9:'IX'}[n] || n;
  }

  // ---- Step 1: Generation grid ----
  const genGrid = document.getElementById('gen-grid');
  Object.entries(GYM_DATA).forEach(([genNum, genData]) => {
    const card = document.createElement('div');
    card.className = 'gen-card';
    card.dataset.gen = genNum;
    card.innerHTML = `
      <div class="gen-number">${toRoman(Number(genNum))}</div>
      <div class="gen-name">${genData.region}</div>
      <div class="gen-region">${genData.games.map(g => g.name).join(' · ')}</div>`;
    card.addEventListener('click', () => selectGen(Number(genNum), card));
    genGrid.appendChild(card);
  });

  function selectGen(genNum, cardEl) {
    document.querySelectorAll('.gen-card').forEach(c => c.classList.remove('selected'));
    cardEl.classList.add('selected');
    selectedGen  = genNum;
    selectedGame = null;
    selectedOpp  = null;
    activeCategory = 'all';

    document.getElementById('opp-section').style.display  = 'none';
    document.getElementById('opp-preview').style.display  = 'none';
    resetCatTabs();

    buildGameButtons(genNum);
    document.getElementById('game-section').style.display = 'block';
    document.getElementById('game-section').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  // ---- Step 2: Game buttons ----
  function buildGameButtons(genNum) {
    const container = document.getElementById('game-buttons');
    container.innerHTML = '';
    GYM_DATA[genNum].games.forEach(game => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-secondary game-btn';
      btn.dataset.gameId = game.id;
      btn.textContent = game.name;
      btn.addEventListener('click', () => selectGame(genNum, game.id, btn));
      container.appendChild(btn);
    });
    // Auto-select if only one game
    if (GYM_DATA[genNum].games.length === 1) {
      container.querySelector('.game-btn').click();
    }
  }

  function selectGame(genNum, gameId, btnEl) {
    document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active-game'));
    btnEl.classList.add('active-game');
    selectedGame = gameId;
    selectedOpp  = null;
    activeCategory = 'all';
    resetCatTabs();
    document.getElementById('trainer-search').value = '';
    document.getElementById('opp-preview').style.display = 'none';
    renderOpponents();
    document.getElementById('opp-section').style.display = 'block';
    document.getElementById('opp-section').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  // ---- Step 3: Category tabs ----
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      renderOpponents();
    });
  });

  function resetCatTabs() {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    document.querySelector('.cat-tab[data-cat="all"]').classList.add('active');
  }

  // ---- Trainer search ----
  document.getElementById('trainer-search').addEventListener('input', renderOpponents);

  // ---- Render opponent grid ----
  function renderOpponents() {
    if (!selectedGen || !selectedGame) return;
    const all      = GYM_DATA[selectedGen].opponents[selectedGame] || [];
    const grid     = document.getElementById('opp-grid');
    const noRes    = document.getElementById('trainer-no-results');
    const q        = document.getElementById('trainer-search').value.trim().toLowerCase();

    let list = all;

    // Filter by category tab
    if (activeCategory !== 'all') {
      list = list.filter(o => o.category === activeCategory);
    }

    // Filter by search query
    if (q) {
      list = list.filter(o =>
        o.name.toLowerCase().includes(q) ||
        o.role.toLowerCase().includes(q) ||
        o.specialType.toLowerCase().includes(q)
      );
    }

    noRes.style.display = list.length === 0 ? 'block' : 'none';
    grid.innerHTML = '';

    list.forEach(opp => {
      const card = document.createElement('div');
      card.className = 'opp-card';
      card.dataset.id  = opp.id;
      card.dataset.cat = opp.category;

      const typeHTML = opp.specialType !== 'mixed'
        ? typeBadge(opp.specialType) : '';

      // Highlight search match in name
      let nameDisplay = opp.name;
      if (q) {
        const idx = opp.name.toLowerCase().indexOf(q);
        if (idx >= 0)
          nameDisplay =
            opp.name.slice(0, idx) +
            `<mark style="background:rgba(255,203,5,.35);color:inherit;border-radius:2px">${opp.name.slice(idx, idx+q.length)}</mark>` +
            opp.name.slice(idx + q.length);
      }

      const catLabel = CAT_LABELS[opp.category] || opp.category;

      card.innerHTML = `
        <div class="cat-badge cat-badge-${opp.category}">${catLabel}</div>
        <div class="opp-name">${nameDisplay}</div>
        <div class="opp-role">${opp.role}</div>
        ${opp.badge ? `<div style="font-size:.7rem;color:#888;margin-bottom:3px">${opp.badge}</div>` : ''}
        <div style="margin-top:5px">${typeHTML}</div>`;

      card.addEventListener('click', () => selectOpponent(opp, card));
      grid.appendChild(card);
    });
  }

  // ---- Select & preview opponent ----
  async function selectOpponent(opp, cardEl) {
    document.querySelectorAll('.opp-card').forEach(c => c.classList.remove('selected'));
    cardEl.classList.add('selected');
    selectedOpp = { ...opp, gen: selectedGen, game: selectedGame };
    await renderOppPreview(opp);
  }

  async function renderOppPreview(opp) {
    const preview = document.getElementById('opp-preview');
    preview.style.display = 'block';
    preview.innerHTML = `<div class="spinner"></div>`;
    preview.scrollIntoView({ behavior:'smooth', block:'nearest' });

    const fetched = await Promise.allSettled(opp.team.map(p => fetchPokemon(p.name)));

    const cardsHTML = opp.team.map((p, i) => {
      const res = fetched[i];
      return res.status === 'fulfilled'
        ? renderPokemonCard(res.value, p.level, false)
        : `<div class="team-slot"><span class="empty-text">${p.name}<br>Lv.${p.level}</span></div>`;
    }).join('');

    const typeHTML    = opp.specialType !== 'mixed' ? typeBadge(opp.specialType) : '';
    const catLabel    = CAT_LABELS[opp.category] || opp.category;
    const gameLabel   = GYM_DATA[selectedGen].games.find(g => g.id === selectedGame)?.name || '';

    preview.innerHTML = `
      <div class="card">
        <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;flex-wrap:wrap">
          <div>
            <div style="margin-bottom:6px">
              <span class="cat-badge cat-badge-${opp.category}">${catLabel}</span>
            </div>
            <div style="font-size:1.5rem;font-weight:900">${opp.name}</div>
            <div style="color:var(--text-muted);font-size:.88rem;margin:3px 0">${opp.role}</div>
            <div style="color:var(--text-muted);font-size:.8rem;margin-bottom:8px">
              Gen ${toRoman(selectedGen)} &mdash; ${gameLabel}
            </div>
            <div>${typeHTML}</div>
          </div>
        </div>
        <div class="section-title" style="margin-top:0;margin-bottom:12px">
          Team (${opp.team.length} Pokémon)
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px">
          ${cardsHTML}
        </div>
        <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <button class="btn btn-primary" onclick="confirmOpponent()">
            &#10003; Select This Opponent
          </button>
          <a href="comparison.html" class="btn btn-yellow" id="go-compare-btn" style="display:none">
            Go to Matchup Analysis &#8594;
          </a>
        </div>
        <div id="opp-confirm-msg"></div>
      </div>`;
  }

  function confirmOpponent() {
    if (!selectedOpp) return;
    saveSelectedOpponent(selectedOpp);
    document.getElementById('opp-confirm-msg').innerHTML = `
      <div class="alert alert-success" style="margin-top:12px">
        &#10003; ${selectedOpp.name} saved!
        <a href="comparison.html" style="color:inherit;font-weight:700;margin-left:8px">
          Go to Matchup Analysis &#8594;
        </a>
      </div>`;
    document.getElementById('go-compare-btn').style.display = 'inline-flex';
  }

  // ---- Restore saved state on load ----
  const saved = getSelectedOpponent();
  if (saved) {
    const genCard = document.querySelector(`.gen-card[data-gen="${saved.gen}"]`);
    if (genCard) {
      genCard.click();
      // game buttons render async; wait a tick
      setTimeout(() => {
        const gameBtn = document.querySelector(`.game-btn[data-game-id="${saved.game}"]`);
        if (gameBtn) {
          gameBtn.click();
          setTimeout(() => {
            const oppCard = document.querySelector(`.opp-card[data-id="${saved.id}"]`);
            if (oppCard) oppCard.click();
          }, 50);
        }
      }, 50);
    }
  }
</script>
</body>
</html>
